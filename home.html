  <body class="w-11/12 mx-auto">
    <!-- search section -->
    <section class="w-11/12 mx-auto">
      <div class="join">
        <div>
          <label class="input validator join-item">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
              </g>
            </svg>
            <input type="email" placeholder="mail@site.com" required />
          </label>
          <div class="validator-hint hidden">Enter valid email address</div>
        </div>
        <button class="btn btn-neutral join-item">Join</button>
      </div>
    </section>

    <section>
      <!-- top button -->
      <section class="mt-12 ml-5 bg-white p-5 justify-around">
        <div>
          <button
            id="all-btn"
            onclick="loadIssueButton(this)"
            class="btn btn-outline btn-primary show"
          >
            All
          </button>
          <button onclick="showOpenCard(this)" class="btn btn-outline btn-primary show">Open</button>
          <button  onclick="showClosedCard(this)" class="btn btn-outline btn-primary show">Close</button>
        </div>
      </section>

      <!-- issues-container -->
      <div class="flex justify-between p-10 bg-white border-purple-600 p-4">
        <div class="flex gap-8">
          <img
            src="assets/Aperture.png"
            alt=""
            class="bg-purple-200 p-4 rounded-s-3xl"
          />
          <div>
            <h1 class="text-2xl font-bold">50 issues</h1>
            <p class="font-semibold">Track and manage your project issues</p>
          </div>
        </div>
        <div>
          <p class="flex gap-4">
            <span><img src="assets/Open-Status.png" alt="" /></span>Open
          </p>
          <p class="flex gap-4">
            <span><img src="assets/Closed- Status .png" alt="" /></span>Closed
          </p>
        </div>
      </div>

      <!-- container -->

      <div id="issueCards" class="bg-gray-100 border-red-600 p-10 w-11/12 mx-auto my-10 grid grid-cols-1 gap-5 md:grid-cols-4 ">
