<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <!-- tailwind and daisyui -->
  <link
    href="https://cdn.jsdelivr.net/npm/daisyui@5"
    rel="stylesheet"
    type="text/css"
  />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- font awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <body>
    <section class="min-h-screen max-w-md mx-auto">
      <div class="card-top pt-32">
        <img src="assets/github-logo.png" alt="" class="w-[250px] mx-auto" />
        <h1 class="text-2xl text-[#1F2937] font-bold text-center">
          GitHub Issues Tracker
        </h1>
        <p class="text-xl text-[#1F2937] text-center">
          Sign in to manage your issues
        </p>
      </div>

      <div class="card-body mx-auto items-center">
        <fieldset
          class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4"
        >
          <label  class="label text-[#1F2937]">Username</label>
          <input id="username" type="text" class="input" placeholder="Enter your Username" />
          <p class="text-[#4A00FF]">Default: admin</p>

          <label  class="label text-[#1F2937]">Password</label>
          <input id="password" type="password" class="input" placeholder="Password" />
          <p class="text-[#4A00FF]">Default: admin123</p>

          <button id="signin-btn" onclick="signIn()" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
      </div>
    </section>
    <script src="script/signin.js"></script>
  </body>
</html>
